<svg xmlns="http://www.w3.org/2000/svg" width="1117" height="679" viewBox="0 0 1117 679">
  <rect width="1117" height="679" fill="#ffffff"/>

  <!-- breadcrumb -->
  <circle cx="34" cy="31" r="11" fill="#eaf2ff" stroke="#9bb8e6"/>
  <text x="56" y="36" font-family="Arial, sans-serif" font-size="15" fill="#667085">All Projects</text>
  <text x="150" y="36" font-family="Arial, sans-serif" font-size="15" fill="#667085">›  Curation</text>
  <text x="245" y="36" font-family="Arial, sans-serif" font-size="15" fill="#667085">›  Policies</text>
  <text x="330" y="36" font-family="Arial, sans-serif" font-size="15" fill="#1d2939" font-weight="700">›  New Curation Policy</text>

  <!-- stepper -->
  <line x1="47" y1="110" x2="47" y2="180" stroke="#d7dce5" stroke-dasharray="3 4"/>
  <circle cx="47" cy="88" r="20" fill="#ffffff" stroke="#2fac66" stroke-width="2"/>
  <path d="M38 88 l6 7 l12 -14" fill="none" stroke="#2fac66" stroke-width="2.5"/>
  <circle cx="47" cy="165" r="20" fill="#ffffff" stroke="#2fac66" stroke-width="2"/>
  <text x="47" y="171" font-family="Arial, sans-serif" font-size="18" fill="#2fac66" font-weight="700" text-anchor="middle">2</text>

  <!-- step 1: policy name card -->
  <rect x="100" y="68" width="990" height="42" rx="6" fill="#ffffff" stroke="#e1e6ef"/>
  <text x="120" y="94" font-family="Arial, sans-serif" font-size="15" fill="#667085">Policy Name</text>
  <text x="278" y="94" font-family="Arial, sans-serif" font-size="15" fill="#1d2939" font-weight="700">labuser-t4-s3-block-axios-1-7-2</text>
  <text x="1068" y="94" font-family="Arial, sans-serif" font-size="14" fill="#667085">⌄</text>

  <!-- step 2: scope card header -->
  <rect x="100" y="145" width="990" height="42" rx="6" fill="#ffffff" stroke="#e1e6ef"/>
  <text x="120" y="171" font-family="Arial, sans-serif" font-size="15" fill="#1d2939" font-weight="700">Scope</text>
  <text x="1068" y="171" font-family="Arial, sans-serif" font-size="14" fill="#667085">⌄</text>

  <text x="100" y="228" font-family="Arial, sans-serif" font-size="16" fill="#344054">Select where to apply this policy in your organization</text>

  <!-- organization-wide (unselected) -->
  <rect x="100" y="250" width="990" height="78" rx="8" fill="#f8fafc" stroke="#e7ecf3"/>
  <rect x="124" y="276" width="26" height="26" rx="4" fill="#eef2f7"/>
  <text x="170" y="288" font-family="Arial, sans-serif" font-size="16" fill="#1d2939" font-weight="700">Organization-wide</text>
  <text x="318" y="287" font-family="Arial, sans-serif" font-size="12" fill="#98a2b3">ⓘ</text>
  <text x="170" y="311" font-family="Arial, sans-serif" font-size="14" fill="#667085">Enforce this policy on all repositories and groups.</text>

  <!-- specific remote repositories (selected) -->
  <rect x="100" y="343" width="990" height="296" rx="8" fill="#ffffff" stroke="#98a2b3" stroke-width="1.5"/>
  <rect x="124" y="364" width="26" height="26" rx="4" fill="#eef2f7"/>
  <text x="170" y="376" font-family="Arial, sans-serif" font-size="16" fill="#1d2939" font-weight="700">Specific remote repositories</text>
  <text x="408" y="375" font-family="Arial, sans-serif" font-size="12" fill="#98a2b3">ⓘ</text>
  <text x="170" y="399" font-family="Arial, sans-serif" font-size="14" fill="#667085">Enforce this policy on selected remote repositories and types.</text>
  <line x1="124" y1="416" x2="1066" y2="416" stroke="#edf0f5"/>

  <text x="124" y="448" font-family="Arial, sans-serif" font-size="14" fill="#667085">Select one of the following options</text>

  <!-- radio: specific repositories (selected) -->
  <circle cx="134" cy="470" r="9" fill="#ffffff" stroke="#2fac66" stroke-width="2"/>
  <circle cx="134" cy="470" r="4.5" fill="#2fac66"/>
  <text x="152" y="476" font-family="Arial, sans-serif" font-size="15" fill="#1d2939">Specific repositories</text>
  <rect x="300" y="458" width="150" height="28" rx="5" fill="#ffffff" stroke="#c3cbd6"/>
  <text x="316" y="477" font-family="Arial, sans-serif" font-size="13" fill="#344054">Edit Repositories</text>

  <!-- radio: repositories package type -->
  <circle cx="134" cy="503" r="9" fill="#ffffff" stroke="#c3cbd6" stroke-width="2"/>
  <text x="152" y="509" font-family="Arial, sans-serif" font-size="15" fill="#344054">Repositories package type</text>

  <!-- selected remote repositories -->
  <text x="124" y="556" font-family="Arial, sans-serif" font-size="15" fill="#1d2939" font-weight="700">Selected remote repositories</text>
  <rect x="362" y="544" width="22" height="18" rx="9" fill="#eef2f7"/>
  <text x="373" y="557" font-family="Arial, sans-serif" font-size="12" fill="#475467" text-anchor="middle">1</text>

  <!-- table header -->
  <g font-family="Arial, sans-serif" font-size="13" fill="#667085">
    <text x="135" y="601">Repository Name</text>
    <text x="378" y="601">Package Type</text>
    <text x="600" y="601">Project</text>
    <text x="822" y="601">Public Name</text>
  </g>
  <line x1="124" y1="616" x2="1066" y2="616" stroke="#edf0f5"/>

  <!-- selected repo row -->
  <rect x="129" y="624" width="218" height="34" rx="4" fill="none" stroke="#d92d20" stroke-width="2"/>
  <text x="142" y="646" font-family="Arial, sans-serif" font-size="15" fill="#1d2939">labuser-t4-s3-npm-remote</text>
  <text x="378" y="646" font-family="Arial, sans-serif" font-size="12" fill="#cb3837" font-weight="700">npm</text>
  <text x="410" y="646" font-family="Arial, sans-serif" font-size="14" fill="#344054">Npm</text>
  <text x="822" y="640" font-family="Arial, sans-serif" font-size="14" fill="#344054">npm registry</text>
  <text x="822" y="657" font-family="Arial, sans-serif" font-size="12" fill="#98a2b3">https://registry.npmjs.org</text>
  <text x="1052" y="646" font-family="Arial, sans-serif" font-size="16" fill="#667085">···</text>
</svg>
