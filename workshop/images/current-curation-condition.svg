<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="635" viewBox="0 0 1480 635">
  <defs>
    <g id="shield"><path d="M0,-9 L8,-6 L8,1 C8,7 4,10 0,12 C-4,10 -8,7 -8,1 L-8,-6 Z" fill="none" stroke="#98a2b3" stroke-width="1.3"/></g>
  </defs>
  <rect width="1480" height="635" fill="#ffffff"/>

  <!-- title -->
  <text x="22" y="36" font-family="Arial, sans-serif" font-size="22" fill="#1d2939" font-weight="700">Create Custom Condition from Template</text>
  <text x="1452" y="38" font-family="Arial, sans-serif" font-size="22" fill="#667085" text-anchor="end">✕</text>
  <text x="22" y="66" font-family="Arial, sans-serif" font-size="14" fill="#667085">Select a condition template from the available templates and customize it to fit your needs to create a new condition</text>

  <!-- left panel -->
  <rect x="20" y="100" width="900" height="500" rx="8" fill="#ffffff" stroke="#e1e6ef"/>
  <text x="42" y="138" font-family="Arial, sans-serif" font-size="16" fill="#1d2939" font-weight="700">Custom conditions templates (9)</text>

  <!-- template rows -->
  <g font-family="Arial, sans-serif" font-size="15">
    <!-- 1 -->
    <circle cx="54" cy="178" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="178"/>
    <text x="100" y="183" fill="#475467">Package OpenSSF scorecard score in a range</text>
    <rect x="820" y="166" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="183" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 2 -->
    <circle cx="54" cy="222" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="222"/>
    <text x="100" y="227" fill="#475467">Package assigned to a label that is banned</text>
    <rect x="820" y="210" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="227" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 3 -->
    <circle cx="54" cy="266" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="266"/>
    <text x="100" y="271" fill="#1d2939" font-weight="700">Block package unless it has a label in allowed labels list</text>
    <rect x="820" y="254" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="271" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 4 SELECTED -->
    <rect x="30" y="288" width="880" height="42" rx="6" fill="#ffffff" stroke="#1d2939" stroke-width="1.5"/>
    <circle cx="54" cy="310" r="9" fill="#fff" stroke="#2fac66" stroke-width="2"/><circle cx="54" cy="310" r="4.5" fill="#2fac66"/>
    <use href="#shield" x="80" y="310"/>
    <text x="100" y="315" fill="#1d2939" font-weight="700">Block specific package version</text>
    <rect x="820" y="298" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="315" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 5 -->
    <circle cx="54" cy="354" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="354"/>
    <text x="100" y="359" fill="#475467">Package license in allowed license list</text>
    <rect x="820" y="342" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="359" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 6 -->
    <circle cx="54" cy="398" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="398"/>
    <text x="100" y="403" fill="#475467">Package license in banned license list</text>
    <rect x="820" y="386" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="403" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 7 -->
    <circle cx="54" cy="442" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="442"/>
    <text x="100" y="447" fill="#475467">Package has vulnerability with CVSS score in range {range}</text>
    <rect x="820" y="430" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="447" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 8 -->
    <circle cx="54" cy="486" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="486"/>
    <text x="100" y="491" fill="#475467">Package version is immature</text>
    <rect x="820" y="474" width="64" height="24" rx="5" fill="#1f2a44"/><text x="852" y="491" fill="#fff" font-size="12" text-anchor="middle">✦ New</text>

    <!-- 9 -->
    <circle cx="54" cy="530" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <use href="#shield" x="80" y="530"/>
    <text x="100" y="535" fill="#475467">Package is vulnerable to CVE {CVE-ID}</text>
  </g>

  <!-- right panel -->
  <g font-family="Arial, sans-serif">
    <text x="950" y="170" font-size="15" fill="#475467">Select package type</text>
    <rect x="950" y="184" width="300" height="38" rx="6" fill="#fff" stroke="#d0d5dd"/>
    <text x="970" y="208" font-size="15" fill="#344054">npm</text>
    <text x="1232" y="208" font-size="13" fill="#98a2b3">⌄</text>

    <text x="950" y="274" font-size="15" fill="#475467">Add package name</text>
    <text x="1098" y="273" font-size="12" fill="#98a2b3">ⓘ</text>
    <rect x="950" y="288" width="460" height="40" rx="6" fill="#fff" stroke="#d0d5dd"/>
    <text x="970" y="313" font-size="15" fill="#344054">axios</text>
    <text x="1392" y="313" font-size="14" fill="#98a2b3">✕</text>

    <!-- all versions (unselected) -->
    <circle cx="960" cy="380" r="9" fill="#fff" stroke="#c3cbd6" stroke-width="1.5"/>
    <text x="980" y="385" font-size="15" fill="#98a2b3" font-weight="700">All versions <tspan font-weight="400">(Current and future versions)</tspan></text>
    <!-- selected versions (selected) -->
    <circle cx="960" cy="414" r="9" fill="#fff" stroke="#2fac66" stroke-width="2"/><circle cx="960" cy="414" r="4.5" fill="#2fac66"/>
    <text x="980" y="419" font-size="15" fill="#1d2939">Selected versions</text>

    <text x="950" y="478" font-size="15" fill="#475467">Define operator and versions</text>
    <rect x="950" y="492" width="170" height="38" rx="6" fill="#fff" stroke="#d0d5dd"/>
    <text x="970" y="516" font-size="15" fill="#344054">Equals</text>
    <text x="1102" y="516" font-size="13" fill="#98a2b3">⌄</text>
    <rect x="1132" y="492" width="280" height="38" rx="6" fill="#fff" stroke="#d0d5dd"/>
    <rect x="1146" y="501" width="64" height="22" rx="4" fill="#eef2f7"/>
    <text x="1156" y="517" font-size="13" fill="#344054">1.7.2 ✕</text>
    <text x="1394" y="516" font-size="13" fill="#98a2b3">⌄</text>

    <text x="952" y="572" font-size="14" fill="#2fac66">⊕</text>
    <text x="972" y="573" font-size="14" fill="#3a7d44">Add more versions</text>
    <text x="966" y="610" font-size="15" fill="#1d2939" font-weight="700">Preview Condition Details</text>
  </g>

  <!-- footer buttons -->
  <rect x="1228" y="592" width="92" height="36" rx="6" fill="#fff" stroke="#c3cbd6"/>
  <text x="1274" y="616" font-family="Arial, sans-serif" font-size="14" fill="#344054" text-anchor="middle">Cancel</text>
  <rect x="1330" y="592" width="148" height="36" rx="6" fill="#2ea24a"/>
  <text x="1404" y="616" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">Save Condition</text>
</svg>
